[MAIN]
# 输出目录路径（所有生成文件将保存到此目录）
# 类型：字符串路径
# 默认值：outputs
# 说明：指定测速结果的输出目录，所有生成的M3U、TXT等文件将保存在此目录下。
output_dir = outputs

# 是否启用结果去重
# 类型：布尔值（true/false）
# 默认值：true
# 说明：如果启用，将自动合并同名同URL的频道，保留最高质量的频道。
enable_deduplication = false

# 首选IP协议版本
# 类型：字符串（ipv4/ipv6/both）
# 默认值：both
# 说明：指定测速时首选的IP协议版本。可选值为ipv4、ipv6或both。
prefer_ip_version = both

[FETCHER]
# 网络请求超时时间（秒）
# 建议值：10-30（根据网络质量调整）
# 说明：设置网络请求的超时时间，防止请求长时间挂起。
timeout = 15

# 并发请求数（同时进行的HTTP请求数量）
# 建议值：3-10（过高可能导致IP被封禁）
# 说明：控制同时进行的HTTP请求数量，影响测速的并发性能。
concurrency = 5

# 自动重试失败源
# 类型：整数
# 建议值：1-3（0表示禁用重试）
# 说明：设置每个频道的最大重试次数，用于应对临时的网络波动。
max_fetch_retries = 2

[TESTER]
# 基础测速超时时间（秒）
# 建议值：5-15（根据目标服务器响应速度调整）
# 说明：设置测速操作的基础超时时间，防止请求长时间未响应。
timeout = 10

# UDP协议专用超时（秒）
# 建议值：0.5-3（UDP需要更短超时）
# 说明：专门针对UDP协议的超时时间，确保UDP测速的及时性。
udp_timeout = 1.5

# HTTP协议专用超时（秒）
# 建议值：5-15
# 说明：专门针对HTTP协议的超时时间，确保HTTP测速的及时性。
http_timeout = 8

# 并发测速数（同时测试的频道数量）
# 建议值：CPU核心数×2
# 说明：控制同时进行测速的频道数量，影响测速的并发性能。
concurrency = 6

# 最大测速尝试次数（失败后重试次数）
# 建议值：2-5
# 说明：设置每个频道的最大测速尝试次数，用于应对测速失败的情况。
max_attempts = 2

# HTTP最低下载速度阈值（单位：KB/s）
# 低于此速度的频道将被标记为离线
# 说明：设置HTTP协议下频道的最低下载速度要求，低于此值的频道将被视为不可用。
min_download_speed = 0.2

# UDP最低下载速度阈值（单位：KB/s）
# 低于此速度的UDP频道将被标记为离线
# 说明：设置UDP协议下频道的最低下载速度要求，低于此值的频道将被视为不可用。
min_udp_download_speed = 5

# UDP最大可接受延迟（毫秒）
# 建议值：100-500（实时流媒体要求更高）
# 说明：设置UDP协议下频道的最大可接受延迟，超过此值的频道将被视为不可用。
max_udp_latency = 1500

# HTTP最大可接受延迟（毫秒）
# 建议值：500-2000
# 说明：设置HTTP协议下频道的最大可接受延迟，超过此值的频道将被视为不可用。
max_http_latency = 1000

# 是否记录详细测速日志
# 类型：布尔值（true/false）
# 默认值：true
# 说明：启用详细日志记录，记录每个频道的测速详细信息，便于调试和监控。
enable_logging = false

# 对于RTP/UDP协议的测试方法
# 可选值: latency (仅测试延迟) 或 speed (测试下载速度)
# 说明：选择UDP协议的测速模式，可以选择仅测试延迟或仅测试下载速度。
udp_test_method = latency

# 对于HTTP协议的测试方法
# 可选值: latency (仅测试延迟), speed (仅测试速度) 或 both (两者都测)
# 说明：选择HTTP协议的测速模式，可以选择仅测试延迟、仅测试速度或两者都测。
http_test_method = both

[EXPORTER]
# 是否生成带时间戳的历史记录文件
# 类型：布尔值（true/false）
# 默认值：true
# 说明：如果启用，将生成带有时间戳的历史记录文件，便于后续分析。
enable_history = false

# 生成的M3U文件名
# 说明：指定生成的M3U文件名称，用于存储频道列表。
m3u_filename = all.m3u

# 生成的TXT文件名
# 说明：指定生成的TXT文件名称，用于存储频道列表的文本格式。
txt_filename = all.txt

# EPG电子节目指南地址
# 支持变量：{timestamp}（时间戳）
# 说明：指定EPG（电子节目指南）的XML地址，用于提供频道的节目信息。
m3u_epg_url = http://epg.51zmt.top:8000/cc.xml.gz

# 台标LOGO URL模板
# 支持变量：
#   {name} - 频道名称
#   {name_encoded} - URL编码后的频道名称
#   {category} - 分类名称
# 说明：指定频道台标LOGO的URL模板，用于在播放器中显示频道图标。
m3u_logo_url = https://gcore.jsdelivr.net/gh/taksssss/tv/icon/{name}.png

# 结果文件压缩级别
# 范围：0-9（0=不压缩，9=最高压缩）
# 说明：设置导出文件的压缩级别，影响文件大小和压缩速度。
gzip_level = 6

[PERFORMANCE]
# 分类并行工作线程数 (0 = 自动)
# 说明：设置分类并行处理的线程数，0表示自动调整。
classification_threads = 8

# 分类批次大小
# 建议值：1000-5000（内存不足时可降低）
# 说明：每次处理的最大频道数量，影响内存使用和处理效率。
classification_batch_size = 2000

# 启用快速匹配模式
# 0 = 禁用（更精确），1 = 启用（更快）
# 说明：选择分类匹配的模式，启用快速匹配可以提高性能，但可能牺牲一定的准确性。
fast_match_mode = 1

# 进度条最小更新间隔（秒）
# 避免刷新过于频繁影响性能
# 说明：设置进度条更新的最小时间间隔，防止更新过于频繁影响性能。
progress_min_update_interval = 0.5

# 进度条显示长度（字符数）
# 说明：设置进度条在终端中的显示长度，影响用户体验。
progress_bar_length = 30

# 内存清理频率
# 每处理N个频道后强制GC
# 0 = 禁用（不建议）
# 说明：设置内存清理的频率，防止内存占用过高。
gc_interval = 1000

[URL_FILTER]
# 需要从URL中移除的查询参数（逗号分隔）
# 示例：token,session_id,user
# 说明：指定需要从频道URL中移除的查询参数，防止缓存问题和隐私泄露。
remove_params = key,playlive,authid

# 自动修复常见URL错误
# 类型：布尔值（true/false）
# 默认值：true
# 说明：启用自动修复常见的URL错误，如补全http://前缀等。
fix_common_url_errors = true

[BLACKLIST]
# 黑名单文件路径
# 文件格式：每行一个黑名单条目（URL或频道名）
# 说明：指定黑名单文件的路径，用于屏蔽特定的频道或URL。
blacklist_path = config/blacklist.txt

# 黑名单匹配模式
# strict = 完全匹配（默认）
# fuzzy = 模糊匹配（包含即视为匹配）
# 说明：选择黑名单的匹配模式，strict为完全匹配，fuzzy为模糊匹配。
match_mode = strict

[WHITELIST]
# 白名单文件路径
# 文件格式：每行一个白名单条目（URL或频道名）
# 说明：指定白名单文件的路径，用于优先处理特定的频道或URL。
whitelist_path = config/whitelist.txt

# 白名单优先级
# 类型：整数（越大优先级越高）
# 影响排序和去重行为
# 说明：设置白名单的优先级，数值越大优先级越高，影响频道的排序和去重行为。
whitelist_priority = 100

[PATHS]
# 订阅源URL列表文件路径
# 格式：每行一个M3U/TXT文件URL
# 说明：指定订阅源URL列表文件的路径，用于获取频道信息。
urls_path = config/urls.txt

# 分类模板文件路径
# 格式见 templates.txt 示例
# 说明：指定分类模板文件的路径，用于定义频道的分类规则。
templates_path = config/templates.txt

# 测速失败URL保存路径
# 说明：指定测速失败的URL保存路径，用于记录未能成功测速的频道。
failed_urls_path = config/failed_urls.txt

# IPv4频道列表输出路径
# 说明：指定IPv4频道列表的输出文件路径。
ipv4_output_path = ipv4.txt

# IPv6频道列表输出路径
# 说明：指定IPv6频道列表的输出文件路径。
ipv6_output_path = ipv6.txt

# 未分类频道保存路径
# 说明：指定未分类频道的保存路径，用于记录未能分类的频道。
uncategorized_channels_path = config/uncategorized_channels.txt

# 临时文件目录
# 说明：指定用于存放临时文件的目录路径。
temp_dir = cache/tmp

[MATCHER]
# 是否清理频道名多余空格
# true = 自动合并连续空格
# 说明：启用后，会自动清理频道名称中的多余空格，提升数据处理的一致性。
enable_space_clean = true

# 备用匹配策略
# 当主规则匹配失败时尝试：
# 0 = 不启用（默认）
# 1 = 名称包含匹配
# 2 = 拼音首字母匹配
# 说明：选择备用匹配策略，用于在主规则匹配失败时提供额外的匹配方式。
fallback_match_strategy = 0

[LOGGING]
# 日志记录级别
# 可选值：debug/info/warning/error/critical
# 默认值：info
# 说明：设置全局日志记录级别，控制日志的详细程度。
log_level = info

# 是否将日志输出到文件（true/false）
# 默认值：false
# 说明：启用后将日志输出到指定的文件中，便于后续查看和分析。
log_to_file = false

# 日志文件保存路径
# 说明：指定日志文件的保存路径，日志将保存在此路径下的文件中。
log_file_path = config/debug.log

# 日志文件最大大小(MB)
# 超过此大小会自动轮转
# 说明：设置日志文件的最大大小，当日志文件超过此大小时会自动进行轮转，防止文件过大。
max_log_size = 10

# 日志轮转计数
# 说明：设置日志轮转后保留的日志文件数量，超过此数量的旧日志文件将被删除。
log_rotate_count = 7

# 模块特定日志级别
# 以下配置允许为不同模块设置不同的日志级别，以实现更细粒度的日志控制。

# Fetcher模块日志级别
# 可选值：debug/info/warning/error/critical
# 说明：设置Fetcher模块的日志级别，控制该模块日志的详细程度。
log_level_fetcher = info

# Parser模块日志级别
# 可选值：debug/info/warning/error/critical
# 说明：设置Parser模块的日志级别，控制该模块日志的详细程度。
log_level_parser = warning

# Matcher模块日志级别
# 可选值：debug/info/warning/error/critical
# 说明：设置Matcher模块的日志级别，控制该模块日志的详细程度。
log_level_matcher = info

# Tester模块日志级别
# 可选值：debug/info/warning/error/critical
# 说明：设置Tester模块的日志级别，控制该模块日志的详细程度。
log_level_tester = debug

# Exporter模块日志级别
# 可选值：debug/info/warning/error/critical
# 说明：设置Exporter模块的日志级别，控制该模块日志的详细程度。
log_level_exporter = info
